server {
    listen 8080;

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /about {
        proxy_pass http://web:3000/about;
    }

    location /admin-panel {
        allow 127.0.0.1;
        deny all;
    }
}