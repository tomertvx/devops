server {
    listen 8080;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin-panel {
        allow 147.235.223.54;
        deny all;
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}