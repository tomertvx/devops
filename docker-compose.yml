version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-net
    depends_on:
      - web

  web:
    build: ./app
    env_file:
      - .env
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - db

  db:
    image: mongo:latest
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-net

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    env_file:
      - .env
    networks:
      - backend-net
    depends_on:
      - db

networks:
  frontend-net:
  backend-net:

volumes:
  mongo-data: