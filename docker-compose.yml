version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-net
    depends_on:
      - web

  web:
    build: ./app
    env_file:
      - .env
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - db

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend-net

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    networks:
      - backend-net

networks:
  frontend-net:
  backend-net:

volumes:
  mysql-data: